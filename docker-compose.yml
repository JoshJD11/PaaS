services:
  # ─────────────────────────────────────────
  # DNS Server (BIND9)
  # ─────────────────────────────────────────
  dns:
    image: ubuntu/bind9:latest
    container_name: dns_server
    restart: always
    volumes:
      - ./dns/named.conf:/etc/bind/named.conf:ro
      - ./dns/named.conf.options:/etc/bind/named.conf.options:ro
      - ./dns/named.conf.local:/etc/bind/named.conf.local:ro
      - ./dns/zones:/etc/bind/zones:ro
    ports:
      - "5353:53/tcp"
      - "5353:53/udp"
    networks:
      lan:
        ipv4_address: 172.20.0.2   # IP fija para que los otros lo apunten
    cap_add:
      - NET_ADMIN
  # ─────────────────────────────────────────
  # Database Server (MySQL)
  # ─────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: mysql_server
    restart: always
    dns:
      - 172.20.0.2
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: wordpress_db
      MYSQL_USER: wp_user
      MYSQL_PASSWORD: wp_password
    volumes:
      - db_data:/var/lib/mysql
    networks:
      lan:
        ipv4_address: 172.20.0.2
    cap_add:
      - NET_ADMIN

  # ─────────────────────────────────────────
  # Web Server + CMS (WordPress)
  # ─────────────────────────────────────────
  wordpress:
    image: wordpress:latest
    container_name: web_server
    restart: always
    depends_on:
      - db
      - dns
    dns:
      - 172.20.0.2
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: wordpress_db
      WORDPRESS_DB_USER: wp_user
      WORDPRESS_DB_PASSWORD: wp_password
    volumes:
      - wp_data:/var/www/html
    networks:
      lan:
        ipv4_address: 172.20.0.4
    ports:
      - "8080:80"   # HTTP sin cifrado

  # ─────────────────────────────────────────
  # HTTPS (Nginx como reverse proxy con SSL)
  # ─────────────────────────────────────────
  nginx:
    image: nginx:latest
    container_name: https_proxy
    restart: always
    depends_on:
      - wordpress
      - dns
    dns:
      - 172.20.0.2
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro   # certificados autofirmados
    networks:
      lan:
        ipv4_address: 172.20.0.5
    ports:
      - "8081:80"
      - "4443:443"

# ─────────────────────────────────────────
# Volúmenes persistentes
# ─────────────────────────────────────────
volumes:
  db_data:
  wp_data:

# ─────────────────────────────────────────
# Red interna (LAN virtual)
# ─────────────────────────────────────────
networks:
  lan:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24
