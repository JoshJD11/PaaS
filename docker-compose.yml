services:

  # ─────────────────────────────────────────
  # Database Server (MySQL)
  # ─────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: mysql_server
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: wordpress_db
      MYSQL_USER: wp_user
      MYSQL_PASSWORD: wp_password
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - lan
    # MySQL NO expone puerto al host, solo a la red interna
    # Así el WebServer es el único que puede conectarse

  # ─────────────────────────────────────────
  # Web Server + CMS (WordPress)
  # ─────────────────────────────────────────
  wordpress:
    image: wordpress:latest
    container_name: web_server
    restart: always
    depends_on:
      - db
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: wordpress_db
      WORDPRESS_DB_USER: wp_user
      WORDPRESS_DB_PASSWORD: wp_password
    volumes:
      - wp_data:/var/www/html
    networks:
      - lan
    ports:
      - "8080:80"   # HTTP sin cifrado

  # ─────────────────────────────────────────
  # HTTPS (Nginx como reverse proxy con SSL)
  # ─────────────────────────────────────────
  nginx:
    image: nginx:latest
    container_name: https_proxy
    restart: always
    depends_on:
      - wordpress
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro   # certificados autofirmados
    networks:
      - lan
    ports:
      - "8081:80"
      - "4443:443"

  # Start_Klob
  # --------------------------------------------------------------------
  # dc1: representa "Active Directory". Aprovisiona un dominio AD nuevo
  # (LAB.LOCAL) usando Samba. 
  # --------------------------------------------------------------------
  dc1:
    build: ./ldap-dc/common
    container_name: dc1
    hostname: dc1
    privileged: true          # Samba AD DC necesita varias capacidades del kernel
    environment:
      ROLE: primary
      DOMAIN_REALM: LAB.LOCAL
      DOMAIN_NETBIOS: LAB
      ADMIN_PASSWORD: "Passw0rd123!"
      MY_IP: 172.28.0.10
      PRIMARY_DC_IP: 172.28.0.10
    networks:
      addomain_net:
        ipv4_address: 172.28.0.10
    extra_hosts:
      - "dc1.lab.local:172.28.0.10"
      - "dc2.lab.local:172.28.0.11"
    volumes:
      - dc1_samba:/var/lib/samba
      - dc1_etc:/etc/samba
    ports:
      - "1389:389"     # LDAP   -> pruebas desde el host con ldapsearch / Apache Directory Studio
      - "1636:636"     # LDAPS
    restart: unless-stopped

  # --------------------------------------------------------------------
  # dc2:
  # que se une como controlador de dominio adicional, replica vía el
  # protocolo nativo de AD (DRS) y expone su propio LDAP (389/636)
  # con los mismos datos del dominio, sincronizados con dc1.
  # --------------------------------------------------------------------
  dc2:
    build: ./ldap-dc/common
    container_name: dc2
    hostname: dc2
    privileged: true
    depends_on:
      - dc1
    environment:
      ROLE: secondary
      DOMAIN_REALM: LAB.LOCAL
      DOMAIN_NETBIOS: LAB
      ADMIN_PASSWORD: "Passw0rd123!"
      MY_IP: 172.28.0.11
      PRIMARY_DC_IP: 172.28.0.10
    networks:
      addomain_net:
        ipv4_address: 172.28.0.11
    extra_hosts:
      - "dc1.lab.local:172.28.0.10"
      - "dc2.lab.local:172.28.0.11"
    volumes:
      - dc2_samba:/var/lib/samba
      - dc2_etc:/etc/samba
    ports:
      - "2389:389"     # LDAP   -> este es el LDAP del "Linux Domain Controller"
      - "2636:636"     # LDAPS
    restart: unless-stopped
  # End_Klob
# ─────────────────────────────────────────
# Volúmenes persistentes
# ─────────────────────────────────────────
volumes:
  db_data:
  wp_data:

  # Start_Klob
  dc1_samba:
  dc1_etc:
  dc2_samba:
  dc2_etc:
  # End_Klob

# ─────────────────────────────────────────
# Red interna (LAN virtual)
# ─────────────────────────────────────────
networks:
  lan:
    driver: bridge
  # Start_Klob
  addomain_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/24
  # End_Klob
