# ─────────────────────────────────────────────────────────────
# Configuración del servidor DHCP (DHCPD) para PaaS.net
# Red atendida: 172.30.0.0/24  (red "wan", fuera de la LAN de
# servicios db/wordpress/nginx)
# ─────────────────────────────────────────────────────────────

default-lease-time 600;
max-lease-time 7200;
authoritative;

# Importante: el rango .100-.200 está fuera del ip_range que
# Docker usa para asignar IPs automáticas a los contenedores
# (ver docker-compose.yml), así no hay colisión entre el IPAM
# de Docker y las concesiones reales que entrega dhcpd.
class "pxeclients" {
    match if substring (option vendor-class-identifier, 0, 9) = "PXEClient";
}

subnet 172.30.0.0 netmask 255.255.255.0 {
    # range 172.30.0.100 172.30.0.200;
    option routers 172.30.0.1;
    option subnet-mask 255.255.255.0;
    option domain-name-servers 172.30.0.1, 8.8.8.8;
    option domain-name "paas.tec.cr";
    default-lease-time 600;
    max-lease-time 7200;

    # Se parte el rango en dos pool, uno para clientes normales
    # y el otro para los PXEClient
    pool {
        range 172.30.0.100 172.30.0.149;
        deny members of "pxeclients";
    }

    pool {
        range 172.30.0.150 172.30.0.190;
        allow members of "pxeclients";
        next-server 172.30.0.11;
        filename "pxelinux.0";
    }
}
