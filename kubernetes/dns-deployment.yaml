apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose convert -f wordpress-kubernetes.yml --out ./kubernetes/
    kompose.version: 1.38.0 (a8f5d1cbd)
  labels:
    io.kompose.service: dns
  name: dns
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: dns
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert -f wordpress-kubernetes.yml --out ./kubernetes/
        kompose.version: 1.38.0 (a8f5d1cbd)
      labels:
        io.kompose.service: dns
    spec:
      containers:
        - image: ubuntu/bind9:latest
          name: dns-server
          ports:
            - containerPort: 53
              protocol: TCP
            - containerPort: 53
              protocol: UDP
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
          volumeMounts:
            - mountPath: /etc/bind/named.conf
              name: dns-cm0
              readOnly: true
              subPath: named.conf
            - mountPath: /etc/bind/named.conf.options
              name: dns-cm1
              readOnly: true
              subPath: named.conf.options
            - mountPath: /etc/bind/named.conf.local
              name: dns-cm2
              readOnly: true
              subPath: named.conf.local
            - mountPath: /etc/bind/zones
              name: dns-cm3
              readOnly: true
      restartPolicy: Always
      volumes:
        - configMap:
            items:
              - key: named.conf
                path: named.conf
            name: dns-cm0
          name: dns-cm0
        - configMap:
            items:
              - key: named.conf.options
                path: named.conf.options
            name: dns-cm1
          name: dns-cm1
        - configMap:
            items:
              - key: named.conf.local
                path: named.conf.local
            name: dns-cm2
          name: dns-cm2
        - configMap:
            name: dns-cm3
          name: dns-cm3
