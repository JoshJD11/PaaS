services:

  # --------------------------------------------------------------------
  # dc1: representa "Active Directory". Aprovisiona un dominio AD nuevo
  # (LAB.LOCAL) usando Samba. Si en tu entorno real ya existiera un
  # Windows Server con AD, este contenedor no haría falta: bastaría con
  # apuntar PRIMARY_DC_IP (en el servicio dc2) hacia ese servidor real.
  # --------------------------------------------------------------------
  dc1:
    build: ./common
    container_name: dc1
    hostname: dc1
    privileged: true          # Samba AD DC necesita varias capacidades del kernel
    environment:
      ROLE: primary
      DOMAIN_REALM: LAB.LOCAL
      DOMAIN_NETBIOS: LAB
      ADMIN_PASSWORD: "Passw0rd123!"
      MY_IP: 172.28.0.10
      PRIMARY_DC_IP: 172.28.0.10
    networks:
      addomain_net:
        ipv4_address: 172.28.0.10
    extra_hosts:
      - "dc1.lab.local:172.28.0.10"
      - "dc2.lab.local:172.28.0.11"
    volumes:
      - dc1_samba:/var/lib/samba
      - dc1_etc:/etc/samba
    ports:
      - "1389:389"     # LDAP   -> pruebas desde el host con ldapsearch / Apache Directory Studio
      - "1636:636"     # LDAPS
    restart: unless-stopped

  # --------------------------------------------------------------------
  # dc2: el entregable de esta asignacion. "Linux Domain Controller"
  # que se une como controlador de dominio adicional, replica vía el
  # protocolo nativo de AD (DRS) y expone su propio LDAP (389/636)
  # con los mismos datos del dominio, sincronizados con dc1.
  # --------------------------------------------------------------------
  dc2:
    build: ./common
    container_name: dc2
    hostname: dc2
    privileged: true
    depends_on:
      - dc1
    environment:
      ROLE: secondary
      DOMAIN_REALM: LAB.LOCAL
      DOMAIN_NETBIOS: LAB
      ADMIN_PASSWORD: "Passw0rd123!"
      MY_IP: 172.28.0.11
      PRIMARY_DC_IP: 172.28.0.10
    networks:
      addomain_net:
        ipv4_address: 172.28.0.11
    extra_hosts:
      - "dc1.lab.local:172.28.0.10"
      - "dc2.lab.local:172.28.0.11"
    volumes:
      - dc2_samba:/var/lib/samba
      - dc2_etc:/etc/samba
    ports:
      - "2389:389"     # LDAP   -> este es el LDAP del "Linux Domain Controller"
      - "2636:636"     # LDAPS
    restart: unless-stopped

networks:
  addomain_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/24

volumes:
  dc1_samba:
  dc1_etc:
  dc2_samba:
  dc2_etc:
