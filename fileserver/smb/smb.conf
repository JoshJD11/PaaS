[global]
    workgroup                = WORKGROUP
    server string            = FileServer SMB Jail — PaaS.net
    server role              = standalone server
    log file                 = /var/log/samba/%m.log
    max log size             = 50
    logging                  = file
    security                 = user
    passdb backend           = tdbsam
    # Usuarios sin cuenta SMB son rechazados
    map to guest             = never
    # Deshabilitar NetBIOS; solo TCP/445
    disable netbios          = yes
    smb ports                = 445
    unix charset             = UTF-8
    min protocol             = SMB2

[shared]
    comment      = Shared Files — SMB Jail
    path         = /srv/smb/shared
    valid users  = smbuser
    read only    = no
    writable     = yes
    create mask  = 0664
    directory mask = 0775
    browseable   = yes